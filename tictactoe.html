<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      letter-spacing: 2px;
      color: #e94560;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      min-height: 1.5em;
      color: #a8dadc;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.win {
      background: #0f3460;
      animation: pulse 0.4s ease;
    }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    #scores {
      display: flex;
      gap: 3rem;
      margin: 1.8rem 0 1.2rem;
      font-size: 1rem;
    }

    .score-box {
      text-align: center;
    }

    .score-box .label { opacity: 0.6; font-size: 0.8rem; letter-spacing: 1px; text-transform: uppercase; }
    .score-box .value { font-size: 2rem; font-weight: bold; }
    .score-box.x .value { color: #e94560; }
    .score-box.o .value { color: #a8dadc; }
    .score-box.draws .value { color: #aaa; }

    #reset {
      margin-top: 0.5rem;
      padding: 0.6rem 2rem;
      font-size: 1rem;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    #reset:hover { background: #c73652; transform: scale(1.05); }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>
  <div id="status">X's turn</div>

  <div id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <div id="scores">
    <div class="score-box x">
      <div class="label">X Wins</div>
      <div class="value" id="xScore">0</div>
    </div>
    <div class="score-box draws">
      <div class="label">Draws</div>
      <div class="value" id="drawScore">0</div>
    </div>
    <div class="score-box o">
      <div class="label">O Wins</div>
      <div class="value" id="oScore">0</div>
    </div>
  </div>

  <button id="reset">New Game</button>

  <script>
    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board, current, gameOver, scores;

    function init() {
      board = Array(9).fill(null);
      current = 'X';
      gameOver = false;
      if (!scores) scores = { X: 0, O: 0, D: 0 };
      render();
      setStatus("X's turn");
    }

    function render() {
      document.querySelectorAll('.cell').forEach((cell, i) => {
        cell.textContent = board[i] || '';
        cell.className = 'cell' + (board[i] ? ' taken ' + board[i].toLowerCase() : '');
      });
      document.getElementById('xScore').textContent = scores.X;
      document.getElementById('oScore').textContent = scores.O;
      document.getElementById('drawScore').textContent = scores.D;
    }

    function setStatus(msg) {
      document.getElementById('status').textContent = msg;
    }

    function checkWinner() {
      for (const [a, b, c] of WINS) {
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return [a, b, c];
        }
      }
      return null;
    }

    function handleClick(i) {
      if (gameOver || board[i]) return;
      board[i] = current;
      render();

      const winLine = checkWinner();
      if (winLine) {
        gameOver = true;
        scores[current]++;
        winLine.forEach(idx => document.querySelectorAll('.cell')[idx].classList.add('win'));
        setStatus(`${current} wins!`);
        render();
      } else if (board.every(Boolean)) {
        gameOver = true;
        scores.D++;
        setStatus("It's a draw!");
        render();
      } else {
        current = current === 'X' ? 'O' : 'X';
        setStatus(`${current}'s turn`);
      }
    }

    document.querySelectorAll('.cell').forEach(cell => {
      cell.addEventListener('click', () => handleClick(+cell.dataset.i));
    });

    document.getElementById('reset').addEventListener('click', init);

    init();
  </script>
</body>
</html>
