<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GUNNER</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
  overflow:hidden;
  font-family:monospace;
}
canvas {
  display:block;
  cursor:none;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// ─────────────────────────────────────────
//  SETUP
// ─────────────────────────────────────────
const C   = document.getElementById('c');
const ctx = C.getContext('2d');
const W   = C.width  = 800;
const H   = C.height = 600;

// ─────────────────────────────────────────
//  INPUT
// ─────────────────────────────────────────
const keys  = {};
const mouse = { x: W/2, y: H/2, held: false };

window.addEventListener('keydown', e => {
  keys[e.key] = true;
  e.preventDefault();
});
window.addEventListener('keyup', e => {
  keys[e.key] = false;
});
C.addEventListener('mousemove', e => {
  const r = C.getBoundingClientRect();
  const scaleX = W / r.width;
  const scaleY = H / r.height;
  mouse.x = (e.clientX - r.left) * scaleX;
  mouse.y = (e.clientY - r.top)  * scaleY;
});
C.addEventListener('mousedown', () => mouse.held = true);
C.addEventListener('mouseup',   () => mouse.held = false);
C.addEventListener('click',     handleClick);

// ─────────────────────────────────────────
//  GAME STATE
// ─────────────────────────────────────────
// states: 'menu' | 'playing' | 'levelComplete' | 'gameOver'
let state = 'menu';
let score = 0;
let level = 1;
let hiScore = +localStorage.getItem('gnr_hi') || 0;

let killCount   = 0;
let killsNeeded = 0;
let totalSpawned = 0;
let spawnTimer   = 0;
let lvlCfg;

let transTimer = 0;   // countdown for level-complete transition

// ─────────────────────────────────────────
//  PLAYER
// ─────────────────────────────────────────
let P; // player object
function mkPlayer() {
  return {
    x: W/2, y: H/2,
    vx: 0,  vy: 0,
    hp: 100, maxHp: 100,
    speed: 3.5,
    angle: 0,
    walkCycle: 0,
    shootCD: 0,
    invincible: 0,
    alive: true,
    muzzleFlash: 0,
  };
}

// ─────────────────────────────────────────
//  ARRAYS
// ─────────────────────────────────────────
let bullets      = [];   // player bullets
let eBullets     = [];   // enemy bullets
let enemies      = [];
let particles    = [];
let popups       = [];   // floating score texts

// ─────────────────────────────────────────
//  LEVEL CONFIG
// ─────────────────────────────────────────
function getLvlCfg(lvl) {
  const types = ['walker'];
  if (lvl >= 3) types.push('charger');
  if (lvl >= 5) types.push('shooter');
  return {
    total:        6 + lvl * 4,
    maxActive:    Math.min(3 + lvl * 2, 18),
    spawnEvery:   Math.max(85 - lvl * 8, 22),
    baseSpeed:    0.9 + lvl * 0.15,
    baseHp:       1   + Math.floor(lvl / 3),
    types,
  };
}

// ─────────────────────────────────────────
//  HELPERS
// ─────────────────────────────────────────
const rnd  = (a, b) => a + Math.random() * (b - a);
const lerp = (a, b, t) => a + (b - a) * t;

function spawnParticles(x, y, color, n, spd=3) {
  for (let i = 0; i < n; i++) {
    const a = rnd(0, Math.PI * 2);
    const s = rnd(0.5, 1.5) * spd;
    particles.push({
      x, y,
      vx: Math.cos(a) * s,
      vy: Math.sin(a) * s,
      color,
      size:  rnd(2, 5),
      life:  1,
      decay: rnd(0.02, 0.05),
    });
  }
}

function addPopup(x, y, text, color='#ffff44') {
  popups.push({ x, y, vy: -1.2, text, color, life: 1.8 });
}

// ─────────────────────────────────────────
//  ENEMY FACTORY
// ─────────────────────────────────────────
function spawnEnemy() {
  const type  = lvlCfg.types[Math.floor(Math.random() * lvlCfg.types.length)];
  const edge  = Math.floor(rnd(0,4));
  const pad   = 40;
  let x, y;
  if (edge === 0) { x = rnd(0, W); y = -pad; }
  else if (edge === 1) { x = W + pad; y = rnd(0, H); }
  else if (edge === 2) { x = rnd(0, W); y = H + pad; }
  else              { x = -pad;    y = rnd(0, H); }

  const e = { x, y, type, angle: 0, walkCycle: rnd(0, Math.PI*2) };

  if (type === 'walker') {
    e.hp     = e.maxHp = lvlCfg.baseHp;
    e.speed  = lvlCfg.baseSpeed;
    e.color  = '#dd3333';
    e.size   = 16;
    e.pts    = 10;
  } else if (type === 'charger') {
    e.hp     = e.maxHp = 1;
    e.speed  = lvlCfg.baseSpeed * 2.2;
    e.color  = '#ff8800';
    e.size   = 13;
    e.pts    = 20;
  } else {
    e.hp     = e.maxHp = lvlCfg.baseHp + 1;
    e.speed  = lvlCfg.baseSpeed * 0.55;
    e.color  = '#bb44ff';
    e.size   = 15;
    e.pts    = 35;
    e.shootCD = rnd(90, 180);
  }

  return e;
}

// ─────────────────────────────────────────
//  SHOOTING
// ─────────────────────────────────────────
function playerShoot() {
  if (P.shootCD > 0 || !P.alive) return;
  P.shootCD      = 10;
  P.muzzleFlash  = 8;

  const a  = Math.atan2(mouse.y - P.y, mouse.x - P.x);
  const sp = (Math.random() - 0.5) * 0.07;
  const gl = 24;
  const bx = P.x + Math.cos(P.angle) * gl;
  const by = P.y + Math.sin(P.angle) * gl;

  bullets.push({ x: bx, y: by, vx: Math.cos(a+sp)*11, vy: Math.sin(a+sp)*11, life: 75 });

  // Muzzle-flash particles
  for (let i=0; i<8; i++) {
    const fa = a + rnd(-0.4, 0.4);
    const fs = rnd(3, 7);
    particles.push({ x:bx, y:by, vx:Math.cos(fa)*fs, vy:Math.sin(fa)*fs,
                     color:'#ffe966', size:rnd(2,5), life:0.9, decay:0.14 });
  }
  // Recoil
  P.vx -= Math.cos(a) * 0.4;
  P.vy -= Math.sin(a) * 0.4;
}

function enemyFire(e) {
  const a  = Math.atan2(P.y - e.y, P.x - e.x);
  eBullets.push({ x:e.x, y:e.y, vx:Math.cos(a)*4.2, vy:Math.sin(a)*4.2, life:160 });
  e.shootCD = rnd(100, 160);
}

// ─────────────────────────────────────────
//  INIT LEVEL
// ─────────────────────────────────────────
function initLevel() {
  lvlCfg       = getLvlCfg(level);
  killsNeeded  = lvlCfg.total;
  killCount    = 0;
  totalSpawned = 0;
  spawnTimer   = 0;
  enemies      = [];
  bullets      = [];
  eBullets     = [];
  particles    = [];
  popups       = [];
}

// ─────────────────────────────────────────
//  UPDATE
// ─────────────────────────────────────────
function update() {
  if (state === 'levelComplete') {
    transTimer--;
    if (transTimer <= 0) {
      level++;
      initLevel();
      state = 'playing';
    }
    particles.forEach(tick_particle);
    particles = particles.filter(p => p.life > 0);
    return;
  }
  if (state !== 'playing') return;

  // ── Player movement ──
  let dx = 0, dy = 0;
  if (keys['ArrowUp']    || keys['w'] || keys['W']) dy -= 1;
  if (keys['ArrowDown']  || keys['s'] || keys['S']) dy += 1;
  if (keys['ArrowLeft']  || keys['a'] || keys['A']) dx -= 1;
  if (keys['ArrowRight'] || keys['d'] || keys['D']) dx += 1;

  if (dx !== 0 || dy !== 0) {
    const len = Math.sqrt(dx*dx + dy*dy);
    P.vx += (dx/len) * P.speed * 0.35;
    P.vy += (dy/len) * P.speed * 0.35;
  }
  P.vx *= 0.78;
  P.vy *= 0.78;

  const spd = Math.hypot(P.vx, P.vy);
  if (spd > P.speed) { P.vx = P.vx/spd*P.speed; P.vy = P.vy/spd*P.speed; }

  P.x = Math.max(14, Math.min(W-14, P.x + P.vx));
  P.y = Math.max(14, Math.min(H-14, P.y + P.vy));

  if (spd > 0.3) P.walkCycle += 0.22;

  // ── Player aim & shoot ──
  P.angle = Math.atan2(mouse.y - P.y, mouse.x - P.x);
  if (mouse.held) playerShoot();
  if (P.shootCD     > 0) P.shootCD--;
  if (P.invincible  > 0) P.invincible--;
  if (P.muzzleFlash > 0) P.muzzleFlash--;

  // ── Spawn enemies ──
  if (totalSpawned < lvlCfg.total) {
    spawnTimer++;
    if (spawnTimer >= lvlCfg.spawnEvery && enemies.length < lvlCfg.maxActive) {
      enemies.push(spawnEnemy());
      totalSpawned++;
      spawnTimer = 0;
    }
  }

  // ── Update enemies ──
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    e.walkCycle += 0.06;
    e.angle = Math.atan2(P.y - e.y, P.x - e.x);
    e.x += Math.cos(e.angle) * e.speed;
    e.y += Math.sin(e.angle) * e.speed;

    if (e.type === 'shooter' && P.alive) {
      e.shootCD--;
      if (e.shootCD <= 0) enemyFire(e);
    }

    // Enemy hits player
    if (P.alive && P.invincible === 0 && Math.hypot(P.x - e.x, P.y - e.y) < e.size + 14) {
      P.hp -= 15;
      P.invincible = 55;
      spawnParticles(P.x, P.y, '#ff4444', 10, 4);
      if (P.hp <= 0) killPlayer();
    }
  }

  // ── Player bullets vs enemies ──
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.x += b.vx; b.y += b.vy; b.life--;
    if (b.life <= 0 || oob(b.x, b.y)) { bullets.splice(i,1); continue; }

    let hit = false;
    for (let j = enemies.length - 1; j >= 0; j--) {
      const e = enemies[j];
      if (Math.hypot(b.x - e.x, b.y - e.y) < e.size + 5) {
        e.hp--;
        spawnParticles(b.x, b.y, e.color, 7, 3);
        bullets.splice(i,1);
        hit = true;
        if (e.hp <= 0) {
          score += e.pts;
          killCount++;
          addPopup(e.x, e.y - 20, '+'+e.pts);
          spawnParticles(e.x, e.y, e.color, 22, 5);
          enemies.splice(j,1);
          if (killCount >= killsNeeded) {
            if (score > hiScore) { hiScore = score; localStorage.setItem('gnr_hi', hiScore); }
            state      = 'levelComplete';
            transTimer = 210;
          }
        }
        break;
      }
    }
    if (hit) continue;
  }

  // ── Enemy bullets vs player ──
  for (let i = eBullets.length - 1; i >= 0; i--) {
    const b = eBullets[i];
    b.x += b.vx; b.y += b.vy; b.life--;
    if (b.life <= 0 || oob(b.x, b.y)) { eBullets.splice(i,1); continue; }
    if (P.alive && P.invincible === 0 && Math.hypot(b.x - P.x, b.y - P.y) < 16) {
      P.hp -= 10;
      P.invincible = 30;
      eBullets.splice(i,1);
      spawnParticles(P.x, P.y, '#ff6666', 8, 3);
      if (P.hp <= 0) killPlayer();
    }
  }

  // ── Particles ──
  particles.forEach(tick_particle);
  particles = particles.filter(p => p.life > 0);

  // ── Popups ──
  popups.forEach(t => { t.y += t.vy; t.life -= 0.02; });
  popups = popups.filter(t => t.life > 0);
}

function tick_particle(p) {
  p.x += p.vx; p.y += p.vy;
  p.vx *= 0.93; p.vy *= 0.93;
  p.life -= p.decay;
}

function oob(x, y) { return x < -20 || x > W+20 || y < -20 || y > H+20; }

function killPlayer() {
  P.hp    = 0;
  P.alive = false;
  spawnParticles(P.x, P.y, '#ff8888', 35, 7);
  if (score > hiScore) { hiScore = score; localStorage.setItem('gnr_hi', hiScore); }
  setTimeout(() => { state = 'gameOver'; }, 1400);
}

// ─────────────────────────────────────────
//  DRAW HELPERS
// ─────────────────────────────────────────
function drawBackground() {
  ctx.fillStyle = '#0d0d12';
  ctx.fillRect(0, 0, W, H);
  // Grid
  ctx.strokeStyle = 'rgba(30,70,30,0.28)';
  ctx.lineWidth   = 1;
  const gs = 40;
  for (let x=0; x<=W; x+=gs) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y=0; y<=H; y+=gs) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
  // Border
  ctx.strokeStyle = '#1a3a1a';
  ctx.lineWidth   = 4;
  ctx.strokeRect(2, 2, W-4, H-4);
}

function drawScanlines() {
  ctx.fillStyle = 'rgba(0,0,0,0.07)';
  for (let y=0; y<H; y+=3) ctx.fillRect(0, y, W, 1);
}

// ── Draw player ──
function drawPlayer() {
  if (!P.alive) return;
  // Blink when invincible
  if (P.invincible > 0 && Math.floor(P.invincible/4) % 2 === 0) return;

  const { x, y, angle, walkCycle, muzzleFlash } = P;

  ctx.save();
  ctx.translate(x, y);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.beginPath();
  ctx.ellipse(0, 8, 11, 5, 0, 0, Math.PI*2);
  ctx.fill();

  // Walking legs
  const swing = Math.sin(walkCycle) * 7;
  ctx.lineCap  = 'round';
  ctx.lineWidth = 5;
  // Back leg
  ctx.strokeStyle = '#3366aa';
  ctx.beginPath(); ctx.moveTo(-3, 5); ctx.lineTo(-5 + swing, 16); ctx.stroke();
  // Front leg
  ctx.strokeStyle = '#4477bb';
  ctx.beginPath(); ctx.moveTo( 3, 5); ctx.lineTo( 5 - swing, 16); ctx.stroke();

  // Body
  ctx.fillStyle   = '#3a7bc8';
  ctx.strokeStyle = '#1a4a88';
  ctx.lineWidth   = 1.5;
  ctx.beginPath();
  ctx.ellipse(0, 0, 10, 13, 0, 0, Math.PI*2);
  ctx.fill(); ctx.stroke();

  // Head
  ctx.fillStyle   = '#f5c08a';
  ctx.strokeStyle = '#c08050';
  ctx.lineWidth   = 1.5;
  ctx.beginPath(); ctx.arc(0, -12, 9, 0, Math.PI*2); ctx.fill(); ctx.stroke();

  // Eyes (roughly face toward gun angle)
  const ex = Math.cos(angle) * 0.5;
  const ey = Math.sin(angle) * 0.5;
  ctx.fillStyle = '#222';
  ctx.beginPath(); ctx.arc(-2.5 + ex, -12 + ey, 2.2, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc( 2.5 + ex, -12 + ey, 2.2, 0, Math.PI*2); ctx.fill();
  // Eyeshine
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-1.8 + ex, -12.8 + ey, 0.8, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc( 3.2 + ex, -12.8 + ey, 0.8, 0, Math.PI*2); ctx.fill();

  // Gun arm (rotates to face mouse)
  ctx.rotate(angle);

  // Arm
  ctx.strokeStyle = '#3a7bc8';
  ctx.lineWidth   = 5;
  ctx.lineCap     = 'round';
  ctx.beginPath(); ctx.moveTo(2, -7); ctx.lineTo(14, -7); ctx.stroke();

  // Gun body
  ctx.fillStyle = '#2a2a2a';
  ctx.fillRect(10, -11, 18, 8);
  // Slide detail
  ctx.fillStyle = '#444';
  ctx.fillRect(12, -10, 12, 3);
  // Barrel
  ctx.fillStyle = '#555';
  ctx.fillRect(26, -9, 10, 5);
  // Grip
  ctx.fillStyle = '#333';
  ctx.fillRect(13, -3, 6, 7);

  // Muzzle flash
  if (muzzleFlash > 0) {
    const alpha = muzzleFlash / 8;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#ffe966';
    ctx.beginPath();
    ctx.arc(36, -7, 7, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(36, -7, 3, 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  ctx.restore();
}

// ── Draw enemy ──
function drawEnemy(e) {
  ctx.save();
  ctx.translate(e.x, e.y);

  // HP bar if damaged
  if (e.hp < e.maxHp) {
    const bw = e.size * 2.5;
    ctx.fillStyle = '#330000';
    ctx.fillRect(-bw/2, -e.size - 14, bw, 5);
    ctx.fillStyle = '#44ff44';
    ctx.fillRect(-bw/2, -e.size - 14, bw * (e.hp / e.maxHp), 5);
  }

  // Taco sprite for all enemy types
  const bob = (e.type === 'walker') ? Math.sin(e.walkCycle * 3) * 1.5 : 0;
  ctx.translate(0, bob);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath(); ctx.ellipse(0, e.size+2, e.size*0.9, 4, 0, 0, Math.PI*2); ctx.fill();

  // Rotate taco to face player
  ctx.rotate(e.angle + Math.PI / 2);

  // Taco emoji
  const fontSize = e.size * 2.2;
  ctx.font = `${fontSize}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🌮', 0, 0);

  // Shooter type: draw gun barrel on top
  if (e.type === 'shooter') {
    ctx.rotate(-e.angle - Math.PI / 2);
    ctx.rotate(e.angle);
    ctx.fillStyle   = '#666';
    ctx.fillRect(0, -3, 20, 6);
    ctx.fillStyle   = '#888';
    ctx.fillRect(18, -4, 8, 8);
  }

  ctx.restore();
}

// ── Draw player bullet ──
function drawBullet(b) {
  const a = Math.atan2(b.vy, b.vx);
  ctx.save();
  ctx.translate(b.x, b.y);
  ctx.rotate(a);

  ctx.shadowColor = '#ffcc00';
  ctx.shadowBlur  = 10;
  ctx.fillStyle   = '#fff8bb';
  ctx.fillRect(-8, -2, 16, 4);
  ctx.fillStyle   = 'rgba(255,200,0,0.35)';
  ctx.fillRect(-18, -1, 10, 2);
  ctx.shadowBlur  = 0;

  ctx.restore();
}

// ── Draw enemy bullet ──
function drawEBullet(b) {
  const a = Math.atan2(b.vy, b.vx);
  ctx.save();
  ctx.translate(b.x, b.y);
  ctx.rotate(a);
  ctx.shadowColor = '#ff00ff';
  ctx.shadowBlur  = 8;
  ctx.fillStyle   = '#ff88ff';
  ctx.fillRect(-5, -2, 10, 4);
  ctx.shadowBlur  = 0;
  ctx.restore();
}

// ── Custom crosshair ──
function drawCrosshair() {
  const { x, y } = mouse;
  const r = 10, g = 3;
  ctx.strokeStyle = '#00ff88';
  ctx.lineWidth   = 1.5;
  ctx.shadowColor = '#00ff88';
  ctx.shadowBlur  = 6;

  // Circle
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.stroke();
  // Cross lines with gap
  ctx.beginPath();
  ctx.moveTo(x - r - g, y); ctx.lineTo(x - g, y);
  ctx.moveTo(x + g, y);     ctx.lineTo(x + r + g, y);
  ctx.moveTo(x, y - r - g); ctx.lineTo(x, y - g);
  ctx.moveTo(x, y + g);     ctx.lineTo(x, y + r + g);
  ctx.stroke();

  ctx.shadowBlur = 0;
}

// ── HUD ──
function drawHUD() {
  // HP bar
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(10, H-34, 204, 18);
  const hpPct = P.hp / P.maxHp;
  ctx.fillStyle = hpPct > 0.5 ? '#22cc44' : hpPct > 0.25 ? '#ccaa22' : '#cc2222';
  ctx.fillRect(12, H-32, 200 * hpPct, 14);
  ctx.strokeStyle = '#445544';
  ctx.lineWidth   = 1;
  ctx.strokeRect(10, H-34, 204, 18);

  // HP label
  ctx.fillStyle = '#aaffaa';
  ctx.font      = 'bold 12px monospace';
  ctx.fillText(`HP  ${P.hp}/${P.maxHp}`, 220, H-20);

  // Score
  ctx.fillStyle = '#aaff44';
  ctx.font      = 'bold 18px monospace';
  ctx.fillText(`SCORE  ${score}`, 10, 26);

  // Level
  ctx.fillStyle = '#44aaff';
  ctx.textAlign = 'center';
  ctx.fillText(`LEVEL  ${level}`, W/2, 26);
  ctx.textAlign = 'left';

  // Kill counter
  ctx.fillStyle = '#ffaa44';
  ctx.textAlign = 'right';
  ctx.fillText(`${killCount} / ${killsNeeded}`, W-10, 26);

  // Hi score
  ctx.fillStyle = '#ff66aa';
  ctx.font      = '12px monospace';
  ctx.fillText(`HI  ${hiScore}`, W-10, 44);
  ctx.textAlign = 'left';

  // Ammo indicator (shoot cooldown)
  const cdPct = 1 - P.shootCD / 10;
  ctx.fillStyle = cdPct < 1 ? '#666' : '#aaff44';
  ctx.fillText(cdPct < 1 ? '■' : '●', W/2 + 5, H-20);
}

// ── Menu ──
function drawMenu() {
  drawBackground();

  // Title glow
  ctx.shadowColor = '#aaff44';
  ctx.shadowBlur  = 40;
  ctx.fillStyle   = '#aaff44';
  ctx.textAlign   = 'center';
  ctx.font        = 'bold 72px monospace';
  ctx.fillText('GUNNER', W/2, 145);
  ctx.shadowBlur  = 0;

  ctx.fillStyle = '#ff4444';
  ctx.font      = '18px monospace';
  ctx.fillText('TOP-DOWN SHOOTER', W/2, 185);

  ctx.fillStyle = '#888';
  ctx.font      = '13px monospace';
  ctx.fillText('─────────────────────────────────', W/2, 220);

  const controls = [
    ['ARROW KEYS / WASD', 'Move'],
    ['MOUSE',             'Aim'],
    ['LEFT CLICK (HOLD)', 'Shoot'],
  ];
  ctx.font = '15px monospace';
  controls.forEach(([key, val], i) => {
    ctx.fillStyle = '#44aaff';
    ctx.textAlign = 'right';
    ctx.fillText(key, W/2 - 10, 260 + i*28);
    ctx.fillStyle = '#ffffff';
    ctx.textAlign = 'left';
    ctx.fillText(val, W/2 + 10, 260 + i*28);
  });

  ctx.textAlign = 'center';
  ctx.fillStyle = '#888';
  ctx.font      = '13px monospace';
  ctx.fillText('─────────────────────────────────', W/2, 354);

  if (Math.floor(Date.now()/500) % 2 === 0) {
    ctx.shadowColor = '#aaff44';
    ctx.shadowBlur  = 14;
    ctx.fillStyle   = '#aaff44';
    ctx.font        = 'bold 20px monospace';
    ctx.fillText('[ CLICK TO START ]', W/2, 410);
    ctx.shadowBlur  = 0;
  }

  ctx.fillStyle = '#ff44aa';
  ctx.font      = '14px monospace';
  ctx.fillText(`HI-SCORE  ${hiScore}`, W/2, 460);

  ctx.textAlign = 'left';
  drawScanlines();
}

// ── Level complete overlay ──
function drawLevelComplete() {
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign   = 'center';
  ctx.shadowColor = '#aaff44';
  ctx.shadowBlur  = 30;
  ctx.fillStyle   = '#aaff44';
  ctx.font        = 'bold 52px monospace';
  ctx.fillText(`LEVEL ${level} CLEAR!`, W/2, H/2 - 40);
  ctx.shadowBlur  = 0;

  ctx.fillStyle = '#fff';
  ctx.font      = '22px monospace';
  ctx.fillText(`SCORE  ${score}`, W/2, H/2 + 15);

  const blink = Math.floor(transTimer / 25) % 2 === 0;
  if (blink) {
    ctx.fillStyle = '#44aaff';
    ctx.font      = '17px monospace';
    ctx.fillText('Prepare for next wave...', W/2, H/2 + 62);
  }
  ctx.textAlign = 'left';
}

// ── Game over ──
function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.72)';
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign   = 'center';
  ctx.shadowColor = '#ff2222';
  ctx.shadowBlur  = 40;
  ctx.fillStyle   = '#ff2222';
  ctx.font        = 'bold 62px monospace';
  ctx.fillText('GAME OVER', W/2, H/2 - 60);
  ctx.shadowBlur  = 0;

  ctx.fillStyle = '#ffffff';
  ctx.font      = '24px monospace';
  ctx.fillText(`SCORE  ${score}`, W/2, H/2 + 5);

  ctx.fillStyle = '#ff44aa';
  ctx.font      = '18px monospace';
  ctx.fillText(`HI-SCORE  ${hiScore}`, W/2, H/2 + 40);

  if (Math.floor(Date.now()/500) % 2 === 0) {
    ctx.fillStyle = '#aaff44';
    ctx.font      = 'bold 20px monospace';
    ctx.fillText('[ CLICK TO RETRY ]', W/2, H/2 + 100);
  }
  ctx.textAlign = 'left';
}

// ─────────────────────────────────────────
//  RENDER
// ─────────────────────────────────────────
function render() {
  if (state === 'menu') { drawMenu(); return; }

  drawBackground();

  // Particles (behind everything)
  ctx.save();
  particles.forEach(p => {
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle   = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size * Math.max(0, p.life), 0, Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha = 1;
  ctx.restore();

  eBullets.forEach(drawEBullet);
  bullets.forEach(drawBullet);
  enemies.forEach(drawEnemy);
  drawPlayer();

  // Floating score popups
  popups.forEach(t => {
    ctx.globalAlpha = Math.min(t.life, 1);
    ctx.fillStyle   = t.color;
    ctx.font        = 'bold 16px monospace';
    ctx.textAlign   = 'center';
    ctx.fillText(t.text, t.x, t.y);
    ctx.textAlign   = 'left';
  });
  ctx.globalAlpha = 1;

  drawHUD();
  drawCrosshair();
  drawScanlines();

  if (state === 'levelComplete') drawLevelComplete();
  if (state === 'gameOver')      drawGameOver();
}

// ─────────────────────────────────────────
//  CLICK HANDLER
// ─────────────────────────────────────────
function handleClick() {
  if (state === 'menu' || state === 'gameOver') {
    score = 0;
    level = 1;
    P     = mkPlayer();
    initLevel();
    state = 'playing';
  }
}

// ─────────────────────────────────────────
//  LOOP
// ─────────────────────────────────────────
function loop() {
  update();
  render();
  requestAnimationFrame(loop);
}

// ─────────────────────────────────────────
//  BOOT
// ─────────────────────────────────────────
P = mkPlayer();
initLevel();
loop();
</script>
</body>
</html>
